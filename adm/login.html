<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grêmio Estudantil — Acesso Restrito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
  <style>
    .adm-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,216,77,.15); color: #FFD84D;
      border: 1px solid rgba(255,216,77,.3);
      border-radius: 20px; padding: 4px 14px; font-size: 12px;
      font-weight: 500; letter-spacing: .04em; margin-bottom: 1.2rem;
    }
  </style>
</head>
<body class="auth-body">

<div class="auth-split">

  <!-- PAINEL ESQUERDO -->
  <aside class="auth-panel-left">
    <div class="panel-bg-shapes">
      <div class="pshape pshape-sun"></div>
      <div class="pshape pshape-wave1"></div>
      <div class="pshape pshape-wave2"></div>
    </div>
    <div class="panel-content">
      <div class="panel-logo"><i class="fa-solid fa-users-gear"></i></div>
      <h1 class="panel-title">Painel do<br>Grêmio</h1>
      <p class="panel-sub">Área exclusiva para membros do Grêmio Estudantil gerenciarem as manifestações recebidas.</p>
    </div>
  </aside>

  <!-- PAINEL DIREITO -->
  <main class="auth-panel-right">
    <div class="auth-form-wrap">

      <div class="adm-badge">
        <i class="fa-solid fa-shield-halved fa-xs"></i> Acesso Restrito
      </div>

      <h2 class="auth-title">Entrar no painel</h2>
      <p class="auth-subtitle mb-4">Somente membros cadastrados pelo responsável.</p>

      <div id="alertBox" class="alert d-none" role="alert"></div>

      <div class="mb-3">
        <label for="email" class="form-label">E-mail do membro</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-envelope fa-sm"></i></span>
          <input type="email" id="email" class="form-control"
                 placeholder="seu@email.com" autocomplete="email" />
        </div>
      </div>

      <div class="mb-4">
        <label for="senha" class="form-label">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock fa-sm"></i></span>
          <input type="password" id="senha" class="form-control"
                 placeholder="Sua senha" autocomplete="current-password" />
          <button class="btn btn-outline-secondary" type="button" id="btnVer">
            <i class="fa-solid fa-eye" id="iconeVer"></i>
          </button>
        </div>
      </div>

      <button id="btnEntrar" class="btn btn-primary w-100" onclick="entrar()">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Entrar no painel
      </button>

      <p class="text-center mt-4 mb-0" style="font-size:13px;color:var(--ce-gray-500)">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        Acesso não autorizado é registrado e monitorado.
      </p>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Mostrar/ocultar senha
  document.getElementById('btnVer').addEventListener('click', () => {
    const input = document.getElementById('senha');
    const icone = document.getElementById('iconeVer');
    const vis   = input.type === 'text';
    input.type  = vis ? 'password' : 'text';
    icone.className = vis ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
  });

  function mostrarAlerta(msg, tipo = 'danger') {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${tipo}`;
    box.textContent = msg;
    box.classList.remove('d-none');
  }

  async function entrar() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn   = document.getElementById('btnEntrar');

    document.getElementById('alertBox').classList.add('d-none');

    if (!email || !senha) {
      mostrarAlerta('Preencha e-mail e senha.');
      return;
    }

    btn.disabled  = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Entrando...';

    try {
      const res  = await fetch('../api/adm/login.php', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, senha }),
      });
      const data = await res.json();

      if (res.ok && data.success) {
        window.location.href = 'index.html';
      } else {
        mostrarAlerta(data.message || 'Erro ao entrar. Tente novamente.');
      }
    } catch {
      mostrarAlerta('Erro de conexão. Verifique sua internet.');
    } finally {
      btn.disabled  = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Entrar no painel';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
</script>
</body>
</html>
